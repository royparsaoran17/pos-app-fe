services:
  omt-fe:
    image: registry.digitalocean.com/so-thai/omt-fe:latest
    container_name: omt-fe
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NITRO_PORT=3000
      - NITRO_HOST=0.0.0.0
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:9005}
    restart: unless-stopped
